<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Topbar</title>
  <link rel="stylesheet" href="topbar.css">
</head>
<body>
  <div id="topbar" dir="auto">
    <div class="summary">
      <strong id="summary-line">Agentic overview unavailable</strong>
      <button id="close" type="button" aria-label="Close overview">×</button>
    </div>
    <ul id="bullets" aria-label="Highlights"></ul>
  </div>
  <script type="module" src="topbar.js"></script>
</body>
</html>
