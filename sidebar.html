<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Web Assistant</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app" aria-live="polite">
    <header class="sidebar-header">
      <div>
        <h1 dir="auto">Agentic Web Assistant</h1>
        <p class="subtitle" dir="auto">Offline-first Gemini 2.5 Flash helper</p>
      </div>
      <div class="header-actions">
        <button id="new-chat" type="button" title="Start new chat">New Chat</button>
        <button id="stop-stream" type="button" title="Stop response" disabled>Stop</button>
      </div>
    </header>
    <section class="quick-actions" aria-label="Quick actions">
      <button type="button" class="quick-action-btn" data-action="summarize">Summarize page</button>
      <button type="button" class="quick-action-btn" data-action="claim-epic">Claim epic</button>
    </section>
    <section class="controls" aria-label="Model controls">
      <label>
        Model
        <select id="model">
          <option value="models/gemini-2.5-flash">Gemini 2.5 Flash</option>
        </select>
      </label>
      <label>
        Temperature
        <input id="temperature" type="range" min="0" max="1" step="0.1" value="0.4">
        <span id="temperature-value">0.4</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="allow-instructions">
        <span>Allow page instructions</span>
      </label>
    </section>
    <main id="chat" tabindex="0">
      <ul id="messages" aria-live="polite"></ul>
    </main>
    <form id="composer" autocomplete="off">
      <textarea id="prompt" rows="3" placeholder="Ask the assistant" dir="auto" required></textarea>
      <div class="composer-actions">
        <button type="submit" id="send">Send</button>
      </div>
    </form>
  </div>
  <script src="vendor/highlight.min.js" integrity="sha384-awsrkcsDe5ZhDq5FtXgVcgbf6hldlSJ5eeXGgb2ZEUMIAT1Tw4bNGpbQr2WbVTs0" crossorigin="anonymous"></script>
  <script type="module" src="sidebar.js"></script>
</body>
</html>
