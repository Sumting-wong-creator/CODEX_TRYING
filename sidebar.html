<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAWA (Hyper Agentic Web Assistant)</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app" aria-live="polite">
    <header class="app-header">
      <div class="brand">
        <span class="brand-glow" aria-hidden="true"></span>
        <div class="brand-copy">
          <p class="eyebrow">Hyper Agentic Web Assistant</p>
          <h1 dir="auto">HAWA</h1>
        </div>
      </div>
      <button id="new-chat" type="button" class="ghost-btn" title="Start a new conversation">New Chat</button>
    </header>
    <main id="chat" tabindex="0">
      <ul id="messages" aria-live="polite"></ul>
    </main>
    <footer class="composer-area">
      <form id="composer" autocomplete="off">
        <div class="composer-shell" role="presentation">
          <div class="mode-switch" role="tablist" aria-label="Conversation mode">
            <button type="button" class="mode-tab active" data-mode="ask" aria-selected="true">Ask</button>
            <button type="button" class="mode-tab" data-mode="agent" aria-selected="false">Agent</button>
          </div>
          <div class="composer-input">
            <label for="prompt" class="prompt-label">Ask HAWA</label>
            <textarea id="prompt" rows="1" placeholder="Ask HAWA…" dir="auto" required></textarea>
            <button type="submit" id="send" aria-label="Send to HAWA"></button>
          </div>
          <div class="composer-meta">
            <label class="toggle">
              <input type="checkbox" id="allow-instructions">
              <span>Allow page instructions</span>
            </label>
            <div class="composer-actions">
              <button id="stop-stream" type="button" class="ghost-btn" disabled>Stop</button>
            </div>
          </div>
        </div>
      </form>
      <div class="chips-row" aria-label="Quick actions">
        <button type="button" class="chip quick-action-btn" data-action="summarize">Summarize this page</button>
      </div>
    </footer>
  </div>
  <script src="vendor/highlight.min.js" integrity="sha384-awsrkcsDe5ZhDq5FtXgVcgbf6hldlSJ5eeXGgb2ZEUMIAT1Tw4bNGpbQr2WbVTs0" crossorigin="anonymous"></script>
  <script type="module" src="sidebar.js"></script>
</body>
</html>
