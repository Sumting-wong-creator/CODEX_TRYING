<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HAWA Quick Actions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <h1>HAWA</h1>
      <p>Hyper Agentic Web Assistant</p>
      <div class="actions">
        <button data-action="open">Open Sidebar</button>
        <button data-action="summarize">Summarize Page</button>
      </div>
      <small>Right-click the icon for options.</small>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
