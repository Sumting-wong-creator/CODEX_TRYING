<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Web Assistant Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <h1 dir="auto">Agentic Web Assistant Settings</h1>
    <section>
      <h2>Gemini API Key</h2>
      <form id="api-form">
        <label>
          API Key
          <input type="password" id="api-key" autocomplete="off" required>
        </label>
        <label class="toggle">
          <input type="checkbox" id="enable-encryption">
          <span>Encrypt API key with passphrase</span>
        </label>
        <label id="passphrase-field" hidden>
          Passphrase
          <input type="password" id="passphrase" autocomplete="off">
        </label>
        <div class="buttons">
          <button type="submit">Save</button>
          <button type="button" id="unlock">Unlock for 30 minutes</button>
          <button type="button" id="test-key">Test API Key</button>
        </div>
        <p id="api-status" role="status"></p>
      </form>
    </section>
    <section>
      <h2>Domain Allow-list</h2>
      <p>Add one domain per line. Leave empty to allow any site.</p>
      <textarea id="allow-list" rows="6" placeholder="example.com"></textarea>
      <button id="save-allow-list" type="button">Save Allow-list</button>
    </section>
    <section>
      <h2>Safety Preferences</h2>
      <label class="toggle">
        <input type="checkbox" id="default-allow-instructions">
        <span>Allow page instructions by default</span>
      </label>
    </section>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
